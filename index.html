<script type="text/babel">

function QuoteModal({ close }) {
  const [form, setForm] = useState({ name:'', phone:'', company:'', service:'', note:'' });
  const [step, setStep] = useState(1); // 1 = form, 2 = done

  const set = (k,v) => setForm(f => ({...f, [k]:v}));

  const submit = (e) => {
    e.preventDefault();
    if (!form.name || !form.phone) return;
    setStep(2);
  };

  return (
    <div className="modal-overlay" onClick={e => { if(e.target===e.currentTarget) close(); }}>
      <div className="modal-box">
        {step === 1 ? (
          <>
            <div className="modal-header">
              <div>

            background:'rgba(7,13,26,0.92)', backdropFilter:'blur(10px)',
            border:'1px solid rgba(255,255,255,0.12)',
            borderRadius:'50px', padding:'0.55rem 1.25rem',
            display:'flex', alignItems:'center', gap:'8px',
            fontSize:'0.78rem', color:'var(--slate-300)', fontWeight:'500',
            whiteSpace:'nowrap', zIndex:5, pointerEvents:'none',
          }}>
            <span style={{color:'var(--gold)'}}>📍</span>
            {branches[mapBranch].addr}

        </div>

        {/* Quick action bar */}
        <div style={{borderTop:'1px solid rgba(255,255,255,0.07)',padding:'1rem 0'}}>
          <div className="container" style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'1rem'}}>
            <div style={{fontSize:'0.8rem',color:'var(--slate-500)'}}>
              <span style={{color:'var(--white)',fontWeight:'600'}}>{branches[mapBranch].city}</span>
              &nbsp;—&nbsp;{branches[mapBranch].addr}
            </div>
            <div style={{display:'flex',gap:'8px'}}>
              <a
                href={`https://maps.google.com/?q=${encodeURIComponent(branches[mapBranch].addr)}`}
                target="_blank"
                className="btn btn-ghost"
                style={{textDecoration:'none',fontSize:'0.8rem'}}
              >
                🗺️ Mở Google Maps
              </a>
              <a href={HOTLINE_HREF} className="btn btn-gold" style={{textDecoration:'none',fontSize:'0.8rem'}}>
                📞 Gọi ngay {HOTLINE}
              </a>
            </div>
          </div>
        </div>
      </section>
    </>
  );
}

/* ─── MAIN APP ───────────────────────────────────────────── */
function App() {
  const [page, setPage] = useState('home');
  const [quoteOpen, setQuoteOpen] = useState(false);
  const [feedbackOpen, setFeedbackOpen] = useState(false);
  const [serviceModal, setServiceModal] = useState(null);
  const [selectedSecuritySvc, setSelectedSecuritySvc] = useState(null);
  const [selectedSolutionTab, setSelectedSolutionTab] = useState('all');

  const openQuote = useCallback(() => setQuoteOpen(true), []);
  const closeQuote = useCallback(() => setQuoteOpen(false), []);
  const openFeedback = useCallback(() => setFeedbackOpen(true), []);
  const closeFeedback = useCallback(() => setFeedbackOpen(false), []);
  const openService = useCallback(s => setServiceModal(s), []);
  const closeService = useCallback(() => setServiceModal(null), []);

  const setPageNav = useCallback(p => { setPage(p); }, []);
  const onSelectSecuritySvc = useCallback(svcId => {
    setSelectedSecuritySvc(svcId);
    setPage('services-security');
  }, []);
  const onSelectSolutionTab = useCallback(tabName => {
    setSelectedSolutionTab(tabName);
    setPage('solutions');
  }, []);

  return (
    <div style={{display:'flex',flexDirection:'column',minHeight:'100vh'}}>
      <EmergencyBar openFeedback={openFeedback} />
      <Nav page={page} setPage={setPageNav} openQuote={openQuote} onSelectSecuritySvc={onSelectSecuritySvc} onSelectSolutionTab={onSelectSolutionTab} />

      <main style={{flex:1}}>
        {page === 'home'             && <HomePage             setPage={setPageNav} openQuote={openQuote} openService={openService} />}
        {page === 'about'            && <AboutPage            setPage={setPageNav} openQuote={openQuote} />}
        {page === 'services'         && <ServicesPage         setPage={setPageNav} openQuote={openQuote} />}
        {page === 'services-security'&& <SecurityServicesPage openQuote={openQuote} selectedSvc={selectedSecuritySvc} setSelectedSvc={setSelectedSecuritySvc} />}
        {page === 'services-invest'  && <InvestigationPage    openQuote={openQuote} />}
        {page === 'solutions'        && <SolutionsPage        openQuote={openQuote} selectedTab={selectedSolutionTab} setSelectedTab={setSelectedSolutionTab} />}
        {page === 'recruitment'      && <RecruitmentPage />}
        {page === 'news'             && <NewsPage             openQuote={openQuote} />}
        {page === 'contact'          && <ContactPage          openQuote={openQuote} />}
      </main>

      <Footer setPage={setPageNav} />
      <FloatingCTA openQuote={openQuote} />

      {quoteOpen    && <QuoteModal close={closeQuote} />}
      {feedbackOpen && <FeedbackModal close={closeFeedback} />}
      {serviceModal && <ServiceModal service={serviceModal} close={closeService} openQuote={openQuote} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
